name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  binary-build:
    name: Build release archive (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: macos-latest
          - os: macos-15-intel
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Build release archive
        run: bash scripts/build.sh

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}
          path: dist/atelier-distribution-*.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [binary-build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: binaries/

      - name: Generate release notes
        id: release_notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          cat <<EOF > RELEASE_NOTES.md
          ## Atelier ${VERSION}

          ### Installation

          \`\`\`bash
          curl -fsSL https://github.com/atelier-ws/atelier/releases/latest/download/install.sh | bash
          \`\`\`

          ### Assets
          - \`install.sh\` — public installer script
          - \`sessions.sh\` — session management utility
          - \`atelier-distribution-*.tar.gz\` — bundled production binaries for supported platforms
          EOF

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          gh release delete "${TAG}" --cleanup-tag -y || true

          for f in binaries/*.tar.gz; do
            shasum -a 256 "$f" | awk '{print $1}' > "${f}.sha256"
          done

          shopt -s nullglob
          assets=(binaries/* scripts/install.sh scripts/sessions.sh)

          if (( ${#assets[@]} == 0 )); then
            echo "::error::No release assets were found."
            exit 1
          fi

          gh release create "${TAG}" \
            --latest \
            --title "Atelier ${TAG}" \
            --notes-file RELEASE_NOTES.md \
            "${assets[@]}"
