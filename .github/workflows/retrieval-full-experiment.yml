name: retrieval-file-fusion-experiments

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: retrieval-file-fusion-bench
  cancel-in-progress: true

jobs:
  retrieval-experiments:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out bench branch
        uses: actions/checkout@v4
        with:
          ref: bench

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Sync environment
        run: uv sync --frozen

      - name: Verify retrieval CLI and experiment hook
        shell: bash
        run: |
          set -euo pipefail
          uv run atelier eval --help | grep -q retrieval
          ATELIER_EXPERIMENT_SYMBOL_VOTE=1 \
          PYTHONPATH="$GITHUB_WORKSPACE/experiments/retrieval_symbol_vote" \
          uv run python - <<'PY'
          from atelier.core.capabilities.code_context.engine import CodeContextEngine

          assert getattr(CodeContextEngine, "_symbol_vote_experiment_installed", False)
          print("retrieval CLI and symbol-vote experiment hook verified")
          PY

      - name: Provision repositories and SQLite indexes
        shell: bash
        env:
          GIT_LFS_SKIP_SMUDGE: "1"
        run: |
          mkdir -p artifacts
          set -o pipefail
          uv run python scripts/provision_retrieval_ci.py 2>&1 | tee artifacts/provision.txt

      - name: Run symbol-vote experiment
        shell: bash
        run: |
          set -o pipefail
          uv run python scripts/run_retrieval_symbol_vote.py 2>&1 | tee artifacts/symbol-vote.txt

      - name: Upload experiment logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrieval-symbol-vote-${{ github.sha }}
          path: artifacts/
          if-no-files-found: warn
