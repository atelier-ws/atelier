name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Generate release notes
        id: release_notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          cat <<EOF > RELEASE_NOTES.md
          ## Atelier ${VERSION}

          **Full changelog:** https://github.com/atelier-runtime/atelier/compare/${TAG}

          ### Installation

          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/atelier-runtime/atelier/main/scripts/install.sh | bash
          \`\`\`

          ### Assets
          - \`atelier-${VERSION}.tar.gz\` — source distribution
          - \`atelier-${VERSION}-py3-none-any.whl\` — pure Python wheel
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: dist/*
          generate_release_notes: true
