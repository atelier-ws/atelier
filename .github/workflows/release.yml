name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  binary-build:
    name: Build binaries (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Build binaries
        run: bash scripts/bundle-prod.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}
          path: atelier-binaries-*.tar.gz

  release:
    name: Create GitHub Release
    needs: [build, binary-build]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: binaries/

      - name: Download source artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Generate release notes
        id: release_notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          cat <<EOF > RELEASE_NOTES.md
          ## Atelier ${VERSION}

          **Full changelog:** https://github.com/atelier-runtime/atelier/compare/${TAG}

          ### Installation

           \`\`\`bash
           curl -fsSL https://github.com/atelier-runtime/atelier/releases/latest/download/install.sh | bash
           \`\`\`

          ### Assets
          - \`atelier-${VERSION}.tar.gz\` — source distribution
          - \`atelier-${VERSION}-py3-none-any.whl\` — pure Python wheel
          - Pre-compiled binaries for Linux/macOS in the release assets.
          EOF

      - name: Create Release in Public Repo
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
        with:
          repository: atelier-runtime/atelier
          body_path: RELEASE_NOTES.md
          files: |
            dist/*
            binaries/*
            scripts/install.sh
          generate_release_notes: true
